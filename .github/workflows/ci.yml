# Switchboard CI — the $0, quota-free regression gate.
# Runs on every push/PR: the test suite, the static type-check, and the OpenAPI
# drift guard (the committed spec/openapi.json must match the code — charter
# Principle 1 / QA finding C1). Tests are hermetic (they set their own env), so no
# secrets are needed here.
name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Static type check (mypy)
        run: mypy

      - name: Tests (pytest)
        run: pytest -q

      - name: OpenAPI spec drift guard
        # Regenerate from the code and fail if the committed artifact is stale.
        run: |
          SWITCHBOARD_DISABLE_DOTENV=1 python scripts/export_openapi.py
          git diff --exit-code spec/openapi.json \
            || (echo "::error::spec/openapi.json is stale — run scripts/export_openapi.py and commit." && exit 1)
